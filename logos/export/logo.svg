<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
  <defs>
    <style>
      .sc-sub { font-family: "Manrope", system-ui, sans-serif; fill: #163A5F; }
    </style>
  </defs>

  <g id="icon-wordmark">
    <!-- S as PCB trace -->
    <path d="M 120 160 h 90 v 40 h -60 v 50 h 60 v 40 h -90"
          fill="none" stroke="#163A5F" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 120 160 h 90 v 40 h -60 v 50 h 60 v 40 h -90"
          fill="none" stroke="rgba(22,58,95,0.15)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- C as PCB trace -->
    <path d="M 370 160 h -60 v 180 h 60"
          fill="none" stroke="#163A5F" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 370 160 h -60 v 180 h 60"
          fill="none" stroke="rgba(22,58,95,0.15)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- S corner nodes -->
    <circle cx="120" cy="160" r="9" fill="#F28C28"/>
    <circle cx="210" cy="160" r="9" fill="#F28C28"/>
    <circle cx="210" cy="200" r="5" fill="#F28C28"/>
    <circle cx="150" cy="200" r="5" fill="#F28C28"/>
    <circle cx="150" cy="250" r="5" fill="#F28C28"/>
    <circle cx="210" cy="250" r="5" fill="#F28C28"/>
    <circle cx="210" cy="290" r="9" fill="#F28C28"/>
    <circle cx="120" cy="290" r="9" fill="#F28C28"/>

    <!-- C corner nodes -->
    <circle cx="370" cy="160" r="9" fill="#F28C28"/>
    <circle cx="310" cy="160" r="5" fill="#F28C28"/>
    <circle cx="310" cy="340" r="5" fill="#F28C28"/>
    <circle cx="370" cy="340" r="9" fill="#F28C28"/>

    <!-- Branch traces S -->
    <line x1="120" y1="160" x2="95" y2="135" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
    <circle cx="95" cy="135" r="5" fill="#163A5F"/>
    <line x1="210" y1="160" x2="235" y2="160" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
    <circle cx="235" cy="160" r="5" fill="#163A5F"/>

    <!-- Branch traces C -->
    <line x1="370" y1="160" x2="395" y2="135" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
    <circle cx="395" cy="135" r="5" fill="#163A5F"/>
    <line x1="310" y1="340" x2="285" y2="365" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
    <circle cx="285" cy="365" r="5" fill="#163A5F"/>

    <!-- Via holes -->
    <circle cx="150" cy="250" r="8" fill="none" stroke="#F28C28" stroke-width="2"/>
    <circle cx="150" cy="250" r="3" fill="#F28C28"/>
    <circle cx="310" cy="250" r="8" fill="none" stroke="#F28C28" stroke-width="2"/>
    <circle cx="310" cy="250" r="3" fill="#F28C28"/>

    <!-- Connection bus between S and C -->
    <line x1="230" y1="250" x2="280" y2="250" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
    <circle cx="255" cy="250" r="4" fill="#F28C28"/>
  </g>

  <g id="wordmark">
    <text x="435" y="248" class="sc-sub" font-size="42" font-weight="500" letter-spacing="4">Tecnología</text>
    <line x1="435" y1="268" x2="650" y2="268" stroke="#F28C28" stroke-width="3" stroke-linecap="round"/>
    <circle cx="650" cy="268" r="3" fill="#F28C28"/>
  </g>
</svg>
