<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dot-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#2a2b3e" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="#1a1b2e"/>
  <rect width="1200" height="630" fill="url(#dot-grid)"/>

  <!-- Watermark SC sutil al fondo -->
  <g id="watermark" opacity="0.04">
    <text x="600" y="380" text-anchor="middle" font-family="monospace, 'Courier New', Consolas, sans-serif" font-size="380" font-weight="900" fill="#F28C28" letter-spacing="20">SC</text>
  </g>

  <!-- Barra superior tipo terminal (no la ventana entera, solo la barra) -->
  <g id="terminal-bar">
    <rect x="200" y="80" width="800" height="40" rx="8" ry="8" fill="#22233a"/>
    <circle cx="224" cy="100" r="6" fill="#ff5f56"/>
    <circle cx="244" cy="100" r="6" fill="#ffbd2e"/>
    <circle cx="264" cy="100" r="6" fill="#27c93f"/>
    <text x="600" y="106" text-anchor="middle" font-family="monospace, 'Courier New', Consolas, sans-serif" font-size="13" fill="#565f89">sc@tecnologia:~/brand</text>
  </g>

  <!-- Nombre de la empresa: SC Tecnología grande y visible -->
  <g id="brand-name">
    <!-- SC grande -->
    <text x="600" y="250" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="112" font-weight="800" fill="#FFFFFF" letter-spacing="4">SC</text>
    <!-- Tecnología debajo -->
    <text x="600" y="310" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48" font-weight="600" fill="#F28C28" letter-spacing="12" text-transform="uppercase">TECNOLOGÍA</text>
  </g>

  <!-- Línea decorativa naranja -->
  <line x1="420" y1="340" x2="780" y2="340" stroke="#F28C28" stroke-width="2" opacity="0.5"/>

  <!-- Terminal con el tagline -->
  <g id="terminal-tagline">
    <rect x="280" y="370" width="640" height="100" rx="8" ry="8" fill="#16172a" stroke="#2a2b3e" stroke-width="1.5"/>
    <text x="310" y="410" font-family="monospace, 'Courier New', Consolas, sans-serif" font-size="18" fill="#7dcfff">
      <tspan fill="#7dcfff">sc@tecnologia</tspan>
      <tspan fill="#9ece6a"> $</tspan>
      <tspan fill="#e0af68"> cat </tspan>
      <tspan fill="#bb9af7">/etc/eslogan</tspan>
    </text>
    <text x="310" y="448" font-family="monospace, 'Courier New', Consolas, sans-serif" font-size="20" font-weight="bold" fill="#9ece6a">Tu departamento IT de confianza</text>
  </g>

  <!-- Pie -->
  <text x="600" y="575" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#565f89" letter-spacing="4">VALENCIA · SCTECNOLOGIA.ES</text>
</svg>
