<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="terminal-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <pattern id="dot-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#2a2b3e" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#1a1b2e"/>
  <rect width="1200" height="630" fill="url(#dot-grid)"/>

  <g id="watermark">
    <text x="600" y="360" text-anchor="middle" font-family="monospace, 'Courier New', 'Consolas', sans-serif" font-size="320" font-weight="900" fill="#9ece6a" opacity="0.04" letter-spacing="8">SC</text>
  </g>

  <g id="terminal-window" filter="url(#terminal-shadow)">
    <rect x="200" y="100" width="800" height="390" rx="12" ry="12" fill="#16172a" stroke="#2a2b3e" stroke-width="2"/>

    <g id="terminal-header">
      <rect x="200" y="100" width="800" height="44" rx="12" ry="12" fill="#22233a"/>
      <rect x="200" y="132" width="800" height="10" fill="#22233a"/>

      <circle cx="230" cy="122" r="7" fill="#ff5f56"/>
      <circle cx="252" cy="122" r="7" fill="#ffbd2e"/>
      <circle cx="274" cy="122" r="7" fill="#27c93f"/>

      <text x="600" y="129" text-anchor="middle" font-family="monospace, 'Courier New', 'Consolas', sans-serif" font-size="15" fill="#565f89">sc@terminal:~/og-image</text>
    </g>

    <g id="terminal-body">
      <text x="235" y="185" font-family="monospace, 'Courier New', 'Consolas', sans-serif" font-size="20" fill="#7dcfff">
        <tspan fill="#7dcfff">sc@terminal:~/og-image</tspan>
        <tspan fill="#9ece6a"> $</tspan>
        <tspan fill="#e0af68"> echo </tspan>
        <tspan fill="#bb9af7">$SC_TECNOLOGIA</tspan>
      </text>

      <text x="235" y="235" font-family="monospace, 'Courier New', 'Consolas', sans-serif" font-size="24" font-weight="bold">
        <tspan fill="#9ece6a">Tu </tspan>
        <tspan fill="#F28C28">departamento </tspan>
        <tspan fill="#9ece6a">IT </tspan>
        <tspan fill="#F28C28">de </tspan>
        <tspan fill="#9ece6a">confianza</tspan>
      </text>

      <text x="235" y="285" font-family="monospace, 'Courier New', 'Consolas', sans-serif" font-size="20" fill="#7dcfff">
        <tspan fill="#7dcfff">sc@terminal:~/og-image</tspan>
        <tspan fill="#9ece6a"> $</tspan>
        <tspan fill="#565f89"> █</tspan>
      </text>
    </g>
  </g>

  <text x="600" y="575" text-anchor="middle" font-family="sans-serif, Arial, Helvetica" font-size="14" fill="#565f89" letter-spacing="3">Valencia · sc-tecnologia.es</text>
</svg>
