<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <clipPath id="frame">
      <rect width="1200" height="630" rx="0" ry="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#163A5F"/>

  <!-- Network connection lines (subtle) -->
  <g id="network-decoration" opacity="0.08" stroke="#F28C28" stroke-width="1.5" fill="none">
    <!-- Horizontal subtle lines -->
    <line x1="0" y1="80" x2="1200" y2="120"/>
    <line x1="0" y1="200" x2="1200" y2="180"/>
    <line x1="0" y1="430" x2="1200" y2="450"/>
    <line x1="0" y1="550" x2="1200" y2="520"/>

    <!-- Angled connection lines -->
    <line x1="100" y1="630" x2="400" y2="0"/>
    <line x1="800" y1="630" x2="1100" y2="0"/>
    <line x1="500" y1="630" x2="700" y2="0"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>

    <!-- Diagonal network cross-lines -->
    <line x1="0" y1="100" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="1200" y2="400"/>

    <!-- Small node dots at intersections -->
    <circle cx="400" cy="150" r="3" fill="#F28C28" stroke="none" opacity="0.12"/>
    <circle cx="650" cy="250" r="2" fill="#F28C28" stroke="none" opacity="0.12"/>
    <circle cx="850" cy="380" r="3" fill="#F28C28" stroke="none" opacity="0.12"/>
    <circle cx="200" cy="480" r="2" fill="#F28C28" stroke="none" opacity="0.12"/>
    <circle cx="950" cy="150" r="2.5" fill="#F28C28" stroke="none" opacity="0.12"/>
    <circle cx="150" cy="120" r="2" fill="#F28C28" stroke="none" opacity="0.12"/>
    <circle cx="1050" cy="500" r="2" fill="#F28C28" stroke="none" opacity="0.12"/>
    <circle cx="500" cy="400" r="2.5" fill="#F28C28" stroke="none" opacity="0.12"/>
    <circle cx="300" cy="300" r="2" fill="#F28C28" stroke="none" opacity="0.12"/>

    <!-- Curved arcs for network feel -->
    <path d="M 100 100 Q 300 50 500 120" opacity="0.06"/>
    <path d="M 700 500 Q 900 550 1150 480" opacity="0.06"/>
    <path d="M 50 350 Q 250 280 450 350" opacity="0.06"/>
  </g>

  <!-- Main hexagonal decorative element -->
  <g id="hexagon-node" transform="translate(280, 315)">
    <!-- Outer hexagon with opacity -->
    <polygon points="0,-195 168.87,-97.5 168.87,97.5 0,195 -168.87,97.5 -168.87,-97.5"
             fill="#F28C28" opacity="0.12"/>

    <!-- Inner hexagon -->
    <polygon points="0,-140 121.24,-70 121.24,70 0,140 -121.24,70 -121.24,-70"
             fill="#F28C28" opacity="0.18"/>

    <!-- Core hexagon -->
    <polygon points="0,-85 73.61,-42.5 73.61,42.5 0,85 -73.61,42.5 -73.61,-42.5"
             fill="#F28C28" opacity="0.25"/>

    <!-- Center node -->
    <circle cx="0" cy="0" r="55" fill="#F28C28" opacity="0.15"/>
    <circle cx="0" cy="0" r="30" fill="#F28C28" opacity="0.35"/>
    <circle cx="0" cy="0" r="12" fill="#F28C28" opacity="0.6"/>

    <!-- Connection lines from hexagon vertices -->
    <g stroke="#F28C28" stroke-width="1.2" opacity="0.15" fill="none">
      <line x1="0" y1="-195" x2="0" y2="-280"/>
      <line x1="168.87" y1="-97.5" x2="250" y2="-150"/>
      <line x1="168.87" y1="97.5" x2="250" y2="150"/>
      <line x1="0" y1="195" x2="0" y2="280"/>
      <line x1="-168.87" y1="97.5" x2="-250" y2="150"/>
      <line x1="-168.87" y1="-97.5" x2="-250" y2="-150"/>
    </g>

    <!-- Small dots at end of connection lines -->
    <circle cx="0" cy="-280" r="4" fill="#F28C28" opacity="0.2"/>
    <circle cx="250" cy="-150" r="3.5" fill="#F28C28" opacity="0.2"/>
    <circle cx="250" cy="150" r="3.5" fill="#F28C28" opacity="0.2"/>
    <circle cx="0" cy="280" r="4" fill="#F28C28" opacity="0.2"/>
    <circle cx="-250" cy="150" r="3.5" fill="#F28C28" opacity="0.2"/>
    <circle cx="-250" cy="-150" r="3.5" fill="#F28C28" opacity="0.2"/>
  </g>

  <!-- Text content -->
  <g id="text-content" font-family="Helvetica, Arial, sans-serif">
    <!-- SC -->
    <text x="540" y="285" font-size="148" font-weight="900" fill="#FFFFFF" letter-spacing="6">SC</text>

    <!-- Tecnología -->
    <text x="545" y="370" font-size="48" font-weight="700" fill="#F28C28" letter-spacing="3">Tecnología</text>
  </g>

  <!-- Tagline -->
  <g id="tagline" font-family="Helvetica, Arial, sans-serif">
    <text x="545" y="440" font-size="24" font-weight="400" fill="#FFFFFF" opacity="0.85" letter-spacing="1.5">Tu departamento IT de confianza</text>
  </g>

  <!-- Bottom right info -->
  <g id="location" font-family="Helvetica, Arial, sans-serif">
    <text x="990" y="600" font-size="16" font-weight="300" fill="#FFFFFF" opacity="0.4" letter-spacing="1.5" text-anchor="end">Valencia · sc-tecnologia.es</text>
  </g>
</svg>
