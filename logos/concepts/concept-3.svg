<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <clipPath id="editor-clip">
      <rect x="250" y="0" width="950" height="630"/>
    </clipPath>
  </defs>

  <!-- Fondo general -->
  <rect id="bg" width="1200" height="630" fill="#1a1b2e"/>

  <!-- Sidebar (panel izquierdo) -->
  <g id="sidebar">
    <rect x="0" y="0" width="250" height="630" fill="#141529"/>

    <!-- Título del explorador -->
    <rect x="0" y="0" width="250" height="36" fill="#111222"/>
    <text x="14" y="24" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#565f89" font-weight="bold">EXPLORADOR</text>

    <!-- Archivos simulados -->
    <g font-family="monospace, 'Courier New', Courier" font-size="13" fill="#565f89">
      <!-- Carpeta servicios -->
      <text x="18" y="62">📁 servicios/</text>
      <text x="36" y="82">📄 web.config</text>
      <text x="36" y="100">📄 database.sql</text>

      <!-- Carpeta src -->
      <text x="18" y="126">📁 src/</text>
      <text x="36" y="146">📄 app.ts</text>
      <text x="36" y="164">📄 contacto.ts</text>
      <text x="36" y="182">📄 index.html</text>
      <text x="36" y="200">📄 styles.css</text>
      <text x="36" y="218">📄 sc-tecnologia.tsx</text>

      <!-- Carpeta components -->
      <text x="18" y="244">📁 components/</text>
      <text x="36" y="264">📄 Header.tsx</text>
      <text x="36" y="282">📄 Footer.tsx</text>
      <text x="36" y="300">📄 Services.tsx</text>
    </g>
  </g>

  <!-- Panel principal (editor) -->
  <g id="editor">
    <rect x="250" y="0" width="950" height="630" fill="#1a1b2e"/>

    <!-- Pestaña del archivo activo -->
    <rect x="250" y="0" width="220" height="36" fill="#163A5F"/>
    <text x="264" y="24" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#c0caf5">
      sc-tecnologia.tsx
    </text>

    <!-- Línea separadora debajo de la pestaña -->
    <line x1="250" y1="36" x2="1200" y2="36" stroke="#163A5F" stroke-width="1"/>

    <!-- Números de línea -->
    <g id="line-numbers" font-family="monospace, 'Courier New', Courier" font-size="15" fill="#565f89" text-anchor="end">
      <text x="278" y="74">1</text>
      <text x="278" y="98">2</text>
      <text x="278" y="122">3</text>
      <text x="278" y="146">4</text>
      <text x="278" y="170">5</text>
      <text x="278" y="194">6</text>
      <text x="278" y="218">7</text>
    </g>

    <!-- Guantera / gutter line (separación de números de línea) -->
    <rect x="250" y="36" width="40" height="594" fill="#141529"/>
    <line x1="290" y1="36" x2="290" y2="630" stroke="#1a1b2e" stroke-width="1"/>

    <!-- Código -->
    <g id="code-content" font-family="monospace, 'Courier New', Courier" font-size="15">
      <!-- Línea 1: // SC Tecnología -->
      <text x="308" y="74" fill="#565f89">// SC Tecnología</text>

      <!-- Línea 2: const SCTecnologia = { -->
      <text x="308" y="98" fill="#c0caf5">
        <tspan fill="#c792ea">const</tspan>
        <tspan fill="#ffcb6b"> SCTecnologia</tspan>
        <tspan fill="#c0caf5"> = </tspan>
        <tspan fill="#c0caf5">{</tspan>
      </text>

      <!-- Línea 3:   nombre: 'SC Tecnología', -->
      <text x="324" y="122" fill="#c0caf5">
        <tspan fill="#e1e1e1">nombre</tspan>
        <tspan fill="#c0caf5">: </tspan>
        <tspan fill="#9ece6a">'SC Tecnología'</tspan>
        <tspan fill="#c0caf5">,</tspan>
      </text>

      <!-- Línea 4:   eslogan: 'Tu departamento IT de confianza', -->
      <text x="324" y="146" fill="#c0caf5">
        <tspan fill="#e1e1e1">eslogan</tspan>
        <tspan fill="#c0caf5">: </tspan>
        <tspan fill="#F28C28">'Tu departamento IT de confianza'</tspan>
        <tspan fill="#c0caf5">,</tspan>
      </text>

      <!-- Línea 5:   ubicación: 'Valencia, ES', -->
      <text x="324" y="170" fill="#c0caf5">
        <tspan fill="#e1e1e1">ubicación</tspan>
        <tspan fill="#c0caf5">: </tspan>
        <tspan fill="#9ece6a">'Valencia, ES'</tspan>
        <tspan fill="#c0caf5">,</tspan>
      </text>

      <!-- Línea 6: }; -->
      <text x="308" y="194" fill="#c0caf5">};</text>

      <!-- Línea 7: export default SCTecnologia; -->
      <text x="308" y="218" fill="#c0caf5">
        <tspan fill="#7dcfff">export</tspan>
        <tspan fill="#c0caf5"> </tspan>
        <tspan fill="#7dcfff">default</tspan>
        <tspan fill="#ffcb6b"> SCTecnologia</tspan>
        <tspan fill="#c0caf5">;</tspan>
      </text>
    </g>
  </g>

  <!-- Status bar -->
  <g id="status-bar">
    <rect x="0" y="594" width="1200" height="36" fill="#141529"/>
    <rect x="250" y="594" width="950" height="36" fill="#111222"/>

    <!-- Rama git -->
    <text x="12" y="618" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#565f89">main</text>

    <!-- Información central -->
    <text x="1200" y="618" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#565f89" text-anchor="middle" textLength="550" lengthAdjust="spacing">SC Tecnología · Valencia · sc-tecnologia.es</text>

    <!-- Indicadores derecha -->
    <text x="1130" y="618" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#565f89" text-anchor="end">UTF-8</text>
  </g>
</svg>
