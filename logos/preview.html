<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG Image — Iteración</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 2rem;
    transition: background-color 0.3s, color 0.3s;
  }
  body.light { background: #f5f5f5; color: #333; }
  body.dark { background: #1a1a1a; color: #eee; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  h1 { font-size: 1.5rem; font-weight: 600; }
  .toggle {
    padding: 0.5rem 1rem;
    border: 1px solid currentColor;
    border-radius: 6px;
    background: transparent;
    color: inherit;
    cursor: pointer;
    font-size: 0.875rem;
  }
  .comparison {
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }
  .card {
    border: 1px solid rgba(128, 128, 128, 0.3);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-img {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    background: #fff;
  }
  body.dark .card-img { background: #2a2a2a; }
  .card-img img {
    width: 100%;
    height: auto;
    display: block;
  }
  .card-label {
    padding: 0.75rem 1rem;
    font-size: 0.875rem;
    font-weight: 500;
    border-top: 1px solid rgba(128, 128, 128, 0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  body.light .card-label { background: #fafafa; }
  body.dark .card-label { background: #222; }
  .badge {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 10px;
    border-radius: 20px;
    background: #F28C28;
    color: #fff;
  }
</style>
</head>
<body class="light">
  <div class="header">
    <h1>OG Image — Iteración</h1>
    <button class="toggle" onclick="document.body.classList.toggle('dark'); document.body.classList.toggle('light'); this.textContent = document.body.classList.contains('dark') ? '☀️ Light' : '🌙 Dark';">🌙 Dark</button>
  </div>
  <div class="comparison">
    <div class="card">
      <div class="card-img">
        <img src="iterations/iteration-1.svg" alt="Iteración 1">
      </div>
      <div class="card-label">
        <span>Iteración 1 — SC Tecnología protagonista</span>
        <span class="badge">Nuevo</span>
      </div>
    </div>
    <div class="card">
      <div class="card-img">
        <img src="concepts/concept-1.svg" alt="Concepto original">
      </div>
      <div class="card-label">
        <span>Concepto original (para comparar)</span>
      </div>
    </div>
  </div>
</body>
</html>
